# orchid-frontend (Next.js 16) — CI

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint

  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit

  commit-lint:
    name: Commit message check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx @commitlint/cli --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"

  # ── Test ────────────────────────────────────────────────────

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    # Needed so ``marocchino/sticky-pull-request-comment`` below can post /
    # update the coverage comment on the PR.  GITHUB_TOKEN is read-only by
    # default for forked PRs and when the repo's default workflow
    # permissions are set to "Read repository contents".
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run tests
        run: npx vitest run --coverage --passWithNoTests --reporter=junit --outputFile=report.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/cobertura-coverage.xml
          if-no-files-found: ignore
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml
          if-no-files-found: ignore
      - name: Coverage summary
        if: hashFiles('coverage/cobertura-coverage.xml') != ''
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/cobertura-coverage.xml"
          format: markdown
          output: both
          badge: true
          fail_below_min: false
          thresholds: "50 75"
      - name: Add coverage PR comment
        if: github.event_name == 'pull_request' && hashFiles('code-coverage-results.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: code-coverage-results.md

  # ── Build ───────────────────────────────────────────────────

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [eslint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
